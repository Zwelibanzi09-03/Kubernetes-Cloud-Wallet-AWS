apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-wallet-app
  namespace: cloud-wallet

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloud-wallet

  template:
    metadata:
      labels:
        app: cloud-wallet

    spec:
      containers:
      - name: cloud-wallet-container
        image: cloud-wallet-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000